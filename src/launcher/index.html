<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Launcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c10;
    --bg2:       #13151d;
    --bg3:       #1a1c28;
    --border:    #1f2334;
    --border2:   #2d3249;
    --text:      #e8eaf0;
    --text2:     #9ca3af;
    --text3:     #4b5563;
    --accent:    #6366f1;
    --accent-glow: rgba(99,102,241,0.25);
    --focus-ring: 0 0 0 2px var(--accent), 0 0 28px var(--accent-glow);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ─── Background atmosphere ─── */
  body::before {
    content: '';
    position: fixed; top: -150px; left: -100px;
    width: 500px; height: 400px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.10) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; bottom: -100px; right: -80px;
    width: 400px; height: 300px;
    background: radial-gradient(ellipse, rgba(20,184,166,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  #app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100vh;
    padding: 40px 56px 28px;
    gap: 0;
  }

  /* ─── Top bar ─── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    flex-shrink: 0;
  }

  .greeting {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 3vw, 38px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .greeting .name { color: var(--accent); }

  .topright {
    text-align: right;
    line-height: 1.4;
  }
  #clock {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 700;
    color: #c7d2fe;
    display: block;
    letter-spacing: -1px;
  }
  #dateline {
    font-size: 13px;
    color: var(--text3);
  }

  /* ─── Search ─── */
  .search-wrap {
    position: relative;
    margin-bottom: 28px;
    flex-shrink: 0;
  }
  .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    font-size: 18px; color: var(--text3); pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px 12px 46px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  #search::placeholder { color: var(--text3); }
  #search:focus { border-color: var(--accent); }

  /* ─── Section label ─── */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  /* ─── Tiles row (fixed height, scrolls left-right) ─── */
  #tiles-grid {
    display: flex;
    flex-wrap: nowrap;
    gap: 20px;
    /* Padding leaves room for the focus scale/glow that overflow:hidden would
       otherwise clip — vertically, and horizontally for the first/last tiles
       (the focused left tile's ring was clipped at the container edge). The
       negative horizontal margin pulls the row's edges back out by the same
       amount so the first tile still lines up with the "APPS"/"RECENTLY USED"
       labels; the clip now happens 16px out, past the glow. */
    padding: 8px 16px 12px;
    margin: 0 -16px 12px;
    scroll-padding: 0 16px;
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: smooth;
    scroll-snap-type: x proximity;
  }
  #tiles-grid::-webkit-scrollbar { height: 6px; }
  #tiles-grid::-webkit-scrollbar-track { background: transparent; }
  #tiles-grid::-webkit-scrollbar-thumb {
    background: var(--border2); border-radius: 3px;
  }

  .tile {
    position: relative;
    /* fixed width: half of a full --cols-wide column, so ~2x --cols tiles fit
       across and the rest scroll */
    flex: 0 0 calc(((100% - (var(--cols, 6) - 1) * 20px) / var(--cols, 6)) / 2);
    scroll-snap-align: start;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px 18px;
    cursor: pointer;
    outline: none;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-height: 110px;
    transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    border-top: 2px solid var(--tile-accent, var(--border));
  }

  .tile:hover {
    transform: scale(1.04);
    border-color: var(--tile-accent, var(--accent));
    background: var(--bg3);
  }

  .tile.focused {
    transform: scale(1.06);
    border-color: var(--accent);
    background: var(--bg3);
    box-shadow: var(--focus-ring);
    z-index: 2;
  }

  .tile.launching {
    animation: launch-pulse 0.4s ease;
  }
  @keyframes launch-pulse {
    0%   { transform: scale(1.06); background: var(--bg3); }
    40%  { transform: scale(1.10); background: #1e1b4b; border-color: #818cf8; }
    100% { transform: scale(1.06); }
  }

  .tile-icon { font-size: 40px; margin-bottom: 12px; line-height: 1; }
  .tile-name {
    font-size: 20px; font-weight: 500;
    color: #d1d5db; line-height: 1.3;
  }

  .tile-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; padding: 2px 6px;
    border-radius: 20px; font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .badge-new    { background: #1d4ed8; color: #bfdbfe; }
  .badge-hot    { background: #7c2d12; color: #fed7aa; }
  .badge-update { background: #064e3b; color: #6ee7b7; }

  /* ─── Recents ─── */
  #recents-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .recent-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px; color: var(--text2);
    cursor: pointer; outline: none;
    transition: border-color 0.12s, color 0.12s;
  }
  .recent-pill:hover { border-color: var(--accent); color: var(--text); }
  .recent-pill.focused {
    border-color: var(--accent);
    color: var(--text);
    box-shadow: var(--focus-ring);
  }
  .recent-pill .rp-icon { font-size: 16px; }

  /* ─── System section (audio profile, …) ─── */
  #system-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .sys-group-label {
    font-size: 13px;
    color: var(--text3);
    margin-right: 4px;
  }
  .audio-opt {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px; color: var(--text2);
    cursor: pointer; outline: none;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .audio-opt:hover { border-color: var(--accent); color: var(--text); }
  .audio-opt.focused {
    border-color: var(--accent);
    color: var(--text);
    box-shadow: var(--focus-ring);
  }
  .audio-opt .ao-icon { font-size: 16px; }
  .audio-opt .ao-radio {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid var(--text3);
    flex-shrink: 0;
    transition: border-color 0.12s, background 0.12s;
  }
  .audio-opt.selected {
    border-color: var(--accent);
    color: var(--text);
    background: var(--bg3);
  }
  .audio-opt.selected .ao-radio {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: inset 0 0 0 2px var(--bg3);
  }

  /* ─── Status bar ─── */
  .statusbar {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-hints {
    display: flex; gap: 16px;
    font-size: 11px; color: var(--text3);
  }
  .hint { display: flex; align-items: center; gap: 5px; }
  .key {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 10px; color: #6b7280;
  }

  .sys-status {
    display: flex; gap: 20px;
    font-size: 11px; color: var(--text3);
  }
  .sys-dot {
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: #22c55e; margin-right: 5px;
    vertical-align: middle;
  }

  /* ─── Toast ─── */
  #toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px; color: var(--text2);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    z-index: 100;
  }
  #toast.show { opacity: 1; }

  /* ─── No results ─── */
  #no-results {
    display: none;
    text-align: center;
    color: var(--text3);
    font-size: 14px;
    padding: 24px 0;
    grid-column: 1/-1;
  }
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="greeting">Sofa collapsed, <span class="name">your brain liquidified</span></div>
    <div class="topright">
      <span id="clock">--:--</span>
      <span id="dateline">Loading…</span>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search apps…" autocomplete="off" spellcheck="false" />
  </div>

  <div class="section-label" id="apps-label">Apps</div>
  <div id="tiles-grid" role="grid" aria-label="Application launcher"></div>

  <div class="section-label">Recently used</div>
  <div id="recents-row"></div>

  <div class="section-label" id="system-label">System</div>
  <div id="system-row"></div>

  <div class="statusbar">
    <div class="nav-hints">
      <span class="hint"><span class="key">↑↓←→</span> Navigate</span>
      <span class="hint"><span class="key">Enter</span> Launch</span>
      <span class="hint"><span class="key">Esc</span> Search</span>
      <span class="hint"><span class="key">🎮</span> Gamepad</span>
    </div>
    <div class="sys-status">
      <span id="net-stat"><span class="sys-dot"></span>Network</span>
      <span id="cpu-stat">CPU —%</span>
      <span id="time-stat"></span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BRIDGE = 'http://127.0.0.1:9234';
let allApps = [];
let config = {};
let system = {};
let audioProfiles = [];
let focusIdx = -1;
let focusZone = 'grid'; // 'grid' | 'recents' | 'system'
let cols = 6;

// ─── Load config from bridge server ───────────────────────────
async function loadConfig() {
  try {
    const res = await fetch(`${BRIDGE}/apps`);
    const data = await res.json();
    config = data;
    allApps = data.apps || [];
    cols = data.settings?.columns || 6;
    document.documentElement.style.setProperty('--cols', cols);
    renderTiles(allApps);
    renderRecents(data.recents || []);
    loadSystem();
  } catch (e) {
    showToast('Could not reach bridge server. Is server.py running?');
    // Fallback: show placeholder tiles
    allApps = [{ name: 'Bridge offline', icon: '⚠️', cmd: '', accent: '#ef4444' }];
    renderTiles(allApps);
  }
}

// ─── Render ────────────────────────────────────────────────────
function renderTiles(apps) {
  const grid = document.getElementById('tiles-grid');
  grid.innerHTML = '';
  if (!apps.length) {
    grid.innerHTML = '<div id="no-results" style="display:block">No apps found</div>';
    return;
  }
  apps.forEach((app, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.setAttribute('tabindex', '0');
    tile.setAttribute('role', 'gridcell');
    tile.setAttribute('aria-label', app.name);
    tile.style.setProperty('--tile-accent', app.accent || 'var(--border)');
    tile.dataset.idx = i;
    tile.dataset.cmd = app.cmd;
    tile.dataset.name = app.name;
    const badgeMap = { hot: 'badge-hot', new: 'badge-new', update: 'badge-update' };
    tile.innerHTML = `
      <div class="tile-icon">${app.icon || '📦'}</div>
      <div class="tile-name">${app.name}</div>
      ${app.badge ? `<span class="tile-badge ${badgeMap[app.badge] || ''}">${app.badge}</span>` : ''}
    `;
    tile.addEventListener('click', () => launchApp(app, tile));
    tile.addEventListener('focus', () => { focusZone = 'grid'; focusIdx = i; highlightTile(i); });
    grid.appendChild(tile);
  });
}

function renderRecents(recentNames) {
  const row = document.getElementById('recents-row');
  row.innerHTML = '';
  const recentApps = recentNames
    .map(name => allApps.find(a => a.name === name))
    .filter(Boolean);
  recentApps.forEach((app, i) => {
    const pill = document.createElement('div');
    pill.className = 'recent-pill';
    pill.setAttribute('tabindex', '0');
    pill.dataset.name = app.name;
    pill.innerHTML = `<span class="rp-icon">${app.icon || '📦'}</span>${app.name}`;
    pill.addEventListener('click', () => launchApp(app, pill));
    pill.addEventListener('focus', () => { focusZone = 'recents'; focusIdx = i; highlightRecent(i); });
    row.appendChild(pill);
  });
}

// ─── System section (audio profile) ───────────────────────────
async function loadSystem() {
  try {
    const res = await fetch(`${BRIDGE}/system`);
    system = await res.json();
    audioProfiles = system.audio?.profiles || [];
    renderSystem();
  } catch (e) {
    // System section just stays empty if /system is unavailable.
  }
}

function renderSystem() {
  const row = document.getElementById('system-row');
  row.innerHTML = '';
  if (!audioProfiles.length) {
    document.getElementById('system-label').style.display = 'none';
    return;
  }
  document.getElementById('system-label').style.display = '';
  const label = document.createElement('span');
  label.className = 'sys-group-label';
  label.textContent = 'Audio profile';
  row.appendChild(label);

  const selected = system.audio?.selected;
  audioProfiles.forEach((p, i) => {
    const opt = document.createElement('div');
    opt.className = 'audio-opt' + (p.name === selected ? ' selected' : '');
    opt.setAttribute('tabindex', '0');
    opt.setAttribute('role', 'radio');
    opt.setAttribute('aria-checked', p.name === selected ? 'true' : 'false');
    opt.dataset.name = p.name;
    opt.innerHTML = `<span class="ao-radio"></span><span class="ao-icon">${p.icon || '🔊'}</span>${p.name}`;
    opt.addEventListener('click', () => setAudio(p));
    opt.addEventListener('focus', () => { focusZone = 'system'; focusIdx = i; highlightAudio(i); });
    row.appendChild(opt);
  });
}

async function setAudio(profile) {
  if (system.audio?.selected === profile.name) return;
  const prev = system.audio?.selected;
  system.audio.selected = profile.name;   // optimistic
  renderSystem();
  if (focusZone === 'system') highlightAudio(focusIdx);
  showToast(`Audio → ${profile.name}…`);
  try {
    const res = await fetch(`${BRIDGE}/set-audio`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: profile.name })
    });
    if (!res.ok) throw new Error(await res.text());
    showToast(`Audio output: ${profile.name}`);
  } catch (e) {
    system.audio.selected = prev;          // revert on failure
    renderSystem();
    if (focusZone === 'system') highlightAudio(focusIdx);
    showToast(`Could not switch audio to ${profile.name}`);
  }
}

// ─── Launch ────────────────────────────────────────────────────
async function launchApp(app, el) {
  if (!app.cmd) return;
  el.classList.add('launching');
  setTimeout(() => el.classList.remove('launching'), 500);
  showToast(`Launching ${app.name}…`);
  updateRecents(app.name);
  try {
    await fetch(`${BRIDGE}/launch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: app.name, cmd: app.cmd, match: app.match || '' })
    });
  } catch (e) {
    showToast(`Error: could not reach bridge server`);
  }
}

function updateRecents(name) {
  const current = config.recents || [];
  const next = [name, ...current.filter(n => n !== name)].slice(0, 8);
  config.recents = next;
  renderRecents(next);
  fetch(`${BRIDGE}/update-recents`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ recents: next })
  }).catch(() => {});
}

// ─── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Clock ─────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  document.getElementById('clock').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateline').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('time-stat').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
updateClock();
setInterval(updateClock, 15000);

// ─── Search ────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  const filtered = q ? allApps.filter(a => a.name.toLowerCase().includes(q)) : allApps;
  renderTiles(filtered);
  focusIdx = -1;
  document.getElementById('apps-label').textContent =
    q ? `Results for "${q}"` : 'Apps';
});

// ─── Focus helpers ─────────────────────────────────────────────
function getTiles() { return [...document.querySelectorAll('.tile')]; }
function getPills() { return [...document.querySelectorAll('.recent-pill')]; }
function getAudioOpts() { return [...document.querySelectorAll('.audio-opt')]; }

function clearFocus() {
  getTiles().forEach(t => t.classList.remove('focused'));
  getPills().forEach(p => p.classList.remove('focused'));
  getAudioOpts().forEach(o => o.classList.remove('focused'));
}

function highlightAudio(idx) {
  clearFocus();
  const opts = getAudioOpts();
  if (idx >= 0 && idx < opts.length) opts[idx].classList.add('focused');
}

function highlightTile(idx) {
  clearFocus();
  const tiles = getTiles();
  if (idx >= 0 && idx < tiles.length) {
    tiles[idx].classList.add('focused');
    tiles[idx].scrollIntoView({ block: 'nearest', inline: 'nearest' });
  }
}

function highlightRecent(idx) {
  clearFocus();
  const pills = getPills();
  if (idx >= 0 && idx < pills.length) {
    pills[idx].classList.add('focused');
  }
}

// ─── Keyboard navigation ───────────────────────────────────────
document.addEventListener('keydown', e => {
  const tiles = getTiles();
  const pills = getPills();
  const opts = getAudioOpts();
  const search = document.getElementById('search');

  if (e.key === 'Escape') {
    clearFocus(); focusIdx = -1; focusZone = 'grid';
    search.focus(); return;
  }

  // If typing, redirect to search
  if (document.activeElement !== search &&
      e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    search.focus();
    return;
  }

  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.key)) {
    e.preventDefault();
  } else return;

  if (e.key === 'Enter') {
    if (focusZone === 'grid' && focusIdx >= 0 && focusIdx < tiles.length) {
      tiles[focusIdx].click();
    } else if (focusZone === 'recents' && focusIdx >= 0 && focusIdx < pills.length) {
      pills[focusIdx].click();
    } else if (focusZone === 'system' && focusIdx >= 0 && focusIdx < opts.length) {
      opts[focusIdx].click();
    }
    return;
  }

  if (focusZone === 'grid' || focusIdx === -1) {
    // Apps are a single horizontal row: Left/Right scroll through them,
    // Down drops to Recents/System, Up is a no-op.
    let next = focusIdx;
    const total = tiles.length;
    if (focusIdx === -1) { next = 0; }
    else if (e.key === 'ArrowRight') next = Math.min(focusIdx + 1, total - 1);
    else if (e.key === 'ArrowLeft')  next = Math.max(focusIdx - 1, 0);
    else if (e.key === 'ArrowDown') {
      if (pills.length) { focusZone = 'recents'; focusIdx = 0; highlightRecent(0); return; }
      else if (opts.length) { focusZone = 'system'; focusIdx = 0; highlightAudio(0); return; }
    }
    focusZone = 'grid'; focusIdx = next; highlightTile(next);
  } else if (focusZone === 'recents') {
    if (e.key === 'ArrowRight') { focusIdx = Math.min(focusIdx + 1, pills.length - 1); highlightRecent(focusIdx); }
    else if (e.key === 'ArrowLeft') { focusIdx = Math.max(focusIdx - 1, 0); highlightRecent(focusIdx); }
    else if (e.key === 'ArrowUp') {
      focusZone = 'grid';
      focusIdx = Math.min(focusIdx, getTiles().length - 1);
      highlightTile(focusIdx);
    }
    else if (e.key === 'ArrowDown') {
      if (opts.length) { focusZone = 'system'; focusIdx = 0; highlightAudio(0); }
    }
  } else {
    // system row (audio profile)
    if (e.key === 'ArrowRight') { focusIdx = Math.min(focusIdx + 1, opts.length - 1); highlightAudio(focusIdx); }
    else if (e.key === 'ArrowLeft') { focusIdx = Math.max(focusIdx - 1, 0); highlightAudio(focusIdx); }
    else if (e.key === 'ArrowUp') {
      if (pills.length) { focusZone = 'recents'; focusIdx = Math.min(focusIdx, pills.length - 1); highlightRecent(focusIdx); }
      else { focusZone = 'grid'; focusIdx = 0; highlightTile(0); }
    }
    else if (e.key === 'ArrowDown') { /* already at bottom */ }
  }
});

// ─── Gamepad support ───────────────────────────────────────────
const gpState = { axes: [0,0,0,0], buttons: Array(17).fill(false), axisDelay: 0 };
const GP_REPEAT_MS = 200;

function pollGamepad() {
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp = [...gps].find(g => g);
  if (!gp) { requestAnimationFrame(pollGamepad); return; }

  const now = Date.now();
  const fire = (key) => document.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true }));

  // D-pad (buttons 12-15) and left stick (axes 0-1)
  const up    = gp.buttons[12]?.pressed || gp.axes[1] < -0.5;
  const down  = gp.buttons[13]?.pressed || gp.axes[1] >  0.5;
  const left  = gp.buttons[14]?.pressed || gp.axes[0] < -0.5;
  const right = gp.buttons[15]?.pressed || gp.axes[0] >  0.5;
  const enter = gp.buttons[0]?.pressed;  // A / Cross
  const esc   = gp.buttons[1]?.pressed;  // B / Circle

  const anyDir = up || down || left || right;

  if (anyDir && now > gpState.axisDelay) {
    if (up)    fire('ArrowUp');
    if (down)  fire('ArrowDown');
    if (left)  fire('ArrowLeft');
    if (right) fire('ArrowRight');
    gpState.axisDelay = now + GP_REPEAT_MS;
  }
  if (!anyDir) gpState.axisDelay = 0;

  if (enter && !gpState.buttons[0]) fire('Enter');
  if (esc   && !gpState.buttons[1]) fire('Escape');
  gpState.buttons[0] = enter;
  gpState.buttons[1] = esc;

  requestAnimationFrame(pollGamepad);
}
requestAnimationFrame(pollGamepad);

let fakeCpu = 12;
setInterval(() => {
  fakeCpu = Math.max(4, Math.min(70, fakeCpu + (Math.random() * 8 - 4)));
  document.getElementById('cpu-stat').textContent = `CPU ${Math.round(fakeCpu)}%`;
}, 4000);

loadConfig();
