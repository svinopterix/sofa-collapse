# keybindings.yaml — system hotkey mapping for the TV launcher.
#
# Single source of truth for the Sway `bindsym` hotkeys. vm/provision.sh reads
# this file and generates the matching `bindsym <key> <command>` lines into
# ~/.config/sway/config. To change a binding, edit here and re-run
# vm/provision.sh (or `swaymsg reload` after, since the config is regenerated).
#
# Notes:
#   • `key`     — a Sway keysym or modifier combo. `$mod` is Mod4 (the Super /
#                 Windows key), defined in the generated Sway config.
#   • `command` — the literal Sway command to run, e.g. `exec "<cmd>"`, `exit`.
#                 `$HOME` and `$mod` are passed through verbatim; Sway's exec
#                 shell expands `$HOME` at runtime.
#   • `comment` — optional; emitted as a comment above the binding.
#
# To discover the keysym a given remote button emits, run `wev` over SSH and
# press the button.
#
# (The US/RU keyboard layout toggle — Alt+Shift — is an xkb input option, not a
# bindsym, so it still lives in the `input "type:keyboard"` block in
# vm/provision.sh, not here.)

bindings:
  # i25 Mini remote "Home" button -> back to the launcher home screen. These
  # remotes emit the Android Home key as XF86HomePage (Linux KEY_HOMEPAGE). If
  # your unit sends a different key, find it with `wev` and replace the keysym.
  - key: XF86HomePage
    command: exec "$HOME/launcher/go-home.sh"

  # --- Media / playback remote keys -----------------------------------------
  # All keysyms below are the standard XF86* media keys. If your remote sends
  # something different, find the real keysym with `wev` and replace it here.

  # System volume (PipeWire, via wpctl). Volume up is capped at 100% (-l 1.0)
  # so the remote can't over-amplify into distortion.
  - key: XF86AudioRaiseVolume
    command: exec "wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+"
    comment: Volume up
  - key: XF86AudioLowerVolume
    command: exec "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-"
    comment: Volume down
  - key: XF86AudioMute
    command: exec "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"
    comment: Mute toggle

  # Play/Pause — routed through media-seek.sh so it targets the app that's
  # actually on screen (focused Sway window), not whatever MPRIS player playerctl
  # lists first (a bare `playerctl play-pause` grabs Chromium/YouTube even when
  # Spotify is in front).
  - key: XF86AudioPlay
    command: exec "$HOME/launcher/media-seek.sh playpause"
    comment: Play / Pause (some remotes send XF86AudioPlayPause — check with wev)

  # Fast-forward / Rewind are state-aware (media-seek.sh checks the focused
  # window): YouTube seeks ±10s, Spotify/everything else skips track.
  #
  # The i25/AirMouse remote's FF/RW buttons actually emit XF86AudioNext /
  # XF86AudioPrev (NOT XF86AudioForward/Rewind — verified with `wev`). We bind
  # all four keysyms to the same handler so it works regardless of which a given
  # remote sends.
  - key: XF86AudioForward
    command: exec "$HOME/launcher/media-seek.sh fwd"
    comment: Fast-forward (seek/next, app-dependent)
  - key: XF86AudioRewind
    command: exec "$HOME/launcher/media-seek.sh back"
    comment: Rewind (seek/previous, app-dependent)
  - key: XF86AudioNext
    command: exec "$HOME/launcher/media-seek.sh fwd"
    comment: Fast-forward — keysym this remote's FF button actually sends
  - key: XF86AudioPrev
    command: exec "$HOME/launcher/media-seek.sh back"
    comment: Rewind — keysym this remote's RW button actually sends

  # Back — acts like a browser Back button: inject Alt+Left into the focused
  # window (wtype). Works in YouTube (--app) and Chrome; harmless elsewhere.
  - key: XF86Back
    command: exec "wtype -M alt -k Left -m alt"
    comment: Browser back (Alt+Left)

  # PageUp / PageDown are intentionally NOT bound: leaving the Prior/Next keysyms
  # unbound lets them pass straight through to the focused app (Chromium, Jellyfin,
  # etc.) to scroll/page natively.

  # Escape hatches for testing.
  - key: $mod+Shift+e
    command: exit
    comment: Exit Sway

  - key: $mod+Return
    command: exec foot
    comment: Open a terminal
